# ============================================================================
# Target Guest VM Configuration
# ============================================================================
# This is the kernel being monitored — when it crashes, the Monitor Guest
# captures its state via HVC #7/#8 and saves a vmcore file.
# ============================================================================

[base]
# Guest VM id (must be unique across all VMs).
id = 1
# Guest VM name (displayed in shell).
name = "target-guest"
# Virtualization type: 1 = VM (standard).
vm_type = 1
# The number of virtual CPUs.
cpu_num = 1
# Physical CPU IDs to pin this VM's vCPUs to.
phys_cpu_ids = [0]

[kernel]
# The entry point of the kernel image.
entry_point = 0x8020_0000
# How the kernel image is loaded: "fs" = filesystem, "memory" = embedded binary.
image_location = "fs"
# Path to the kernel image on the filesystem.
kernel_path = "/guest/target/kernel"
# The load address of the kernel image in guest physical memory.
kernel_load_addr = 0x8020_0000
# Device tree blob load address (required for AArch64).
dtb_load_addr = 0x8000_0000

# Memory regions: (base_gpa, size, flags, map_type).
# map_type: 0 = ALLOC, 1 = IDENTICAL, 2 = RESERVED
memory_regions = [
  [0x8000_0000, 0x1000_0000, 0x7, 1], # 256 MB System RAM, identity-mapped
]

[devices]
# Interrupt mode: "passthrough" for physical GIC, "emulated" for virtual GIC.
interrupt_mode = "passthrough"

# Pass-through all devices to the guest.
passthrough_devices = [
    ["/"],
]
