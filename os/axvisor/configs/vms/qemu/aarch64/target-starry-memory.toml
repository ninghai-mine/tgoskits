# ============================================================================
# Target Guest VM Configuration — StarryOS
# ============================================================================
# Runs StarryOS as the monitored guest.  StarryOS is a Linux-compatible
# monolithic OS built on ArceOS modules.  It needs:
#   - 512 MB RAM (same as its native QEMU config)
#   - A virtio-blk device for its Alpine root filesystem
#   - PL011 UART for console I/O
# ============================================================================

[base]
id = 1
name = "target-starry"
vm_type = 1
cpu_num = 1
phys_cpu_ids = [0]

[kernel]
entry_point = 0x8020_0000
image_location = "memory"
kernel_path = "../../../../../../target/aarch64-unknown-none-softfloat/release/starryos.bin"
kernel_load_addr = 0x8020_0000
dtb_load_addr = 0x8000_0000

# 512 MB RAM (0x2000_0000)
memory_regions = [
  [0x8000_0000, 0x2000_0000, 0x7, 0],
]

[devices]
interrupt_mode = "passthrough"

# MMIO regions to pass through:
#   0x900_0000 — PL011 UART (console)
#   0xA00_0000 — virtio-mmio for block device (rootfs)
passthrough_addresses = [
    { base_gpa = 0x9000000, length = 0x1000 },
    { base_gpa = 0xA000000, length = 0x10000 },
]

passthrough_devices = [["/"]]
excluded_devices = []
emu_devices = []
